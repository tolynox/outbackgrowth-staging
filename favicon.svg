<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#070C14"/>
  <!-- Gold border -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6.25" fill="none" stroke="#F5A623" stroke-opacity="0.35" stroke-width="1.5"/>
  <!-- Bar 1 (short, left) -->
  <rect x="6" y="20" width="4" height="6" rx="1.5" fill="#F5A623" fill-opacity="0.4"/>
  <!-- Bar 2 (medium, centre) -->
  <rect x="12" y="15" width="4" height="11" rx="1.5" fill="#F5A623" fill-opacity="0.7"/>
  <!-- Bar 3 (tall, right) -->
  <rect x="18" y="10" width="4" height="16" rx="1.5" fill="#F5A623"/>
  <!-- Rising arrow line -->
  <polyline points="8,14 16,8 22,11" fill="none" stroke="#F5A623" stroke-opacity="0.55" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow head -->
  <polyline points="19.5,8 22,8 22,10.5" fill="none" stroke="#F5A623" stroke-opacity="0.55" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
